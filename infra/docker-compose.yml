services:
  postgres:
    image: postgres:16
    container_name: sudconnect-postgres
    environment:
      POSTGRES_DB: sudconnect
      POSTGRES_USER: sudconnect
      POSTGRES_PASSWORD: sudconnect
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sudconnect"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: